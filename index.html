<!doctype html>
<html lang="EN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Money Clicker</title>
    <link rel="stylesheet" href="main.css" />
  </head>
  <body>
    <main class="game_layout">
        <aside class="stats">
          <button onclick="rebirth()">Rebirth<span id="rebirthAmount"></span></button>
          <progress id="rebirthProgress" max="100" value="0"></progress>
          <div id="statsContainer">

          </div>
          <button onclick="resetProgress()">Reset progress</button>
        </aside>
        <section class="game_area">
          <div id="moneyInfo">
            <p class="money">Money: $<span id="money">0</span></p>
            <p><span id="cps">0.0</span> Cps</p>
          </div>
            <button class="selector" id="money_button">
                <img id="coinImg" class="selector" src="./Imgs/Coin_0.png" alt="coin">
            </button>
        </section>
        <aside class="shop_area">
            <div class="upgrades"></div>
            <hr id="hrUpgrades">
            <div class="buildings"></div>
        </aside>
        <div id="saveIndicator" class="hidden">Saving...</div>
    </main>
    <script src="main.js"></script>
  </body>
</html>
